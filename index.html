<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCT Hub | 无畏契约上分平台</title>
<meta property="og:title" content="VCT Hub | 无畏契约上分平台">
<meta property="og:description" content="十宗罪 · 车队大厅 · 对局记录 · 完整进阶指南 —— 打造无畏契约玩家共同进步的交互式平台">
<meta property="og:url" content="https://chenyizhou188.github.io/valorant-sins/">
<meta property="twitter:card" content="summary_large_image">
<style>
/* === CSS Variables === */
:root {
  --brand-red:#ff4655; --brand-dark:#0f1923; --brand-mid:#1a2634;
  --surface:#1a2634; --surface-hover:#233044; --border:#2a3a4a;
  --text:#e8e8e6; --text-dim:#8b9799; --accent-cyan:#00e5ff;
  --bg:#0f1923; --shadow:0 4px 24px rgba(0,0,0,.4);
  --radius:8px; --radius-sm:4px; --nav-height:56px;
  --font-mono:'JetBrains Mono','Cascadia Code',Consolas,monospace;
}
[data-theme="light"] {
  --surface:#f0f2f5; --surface-hover:#e4e6e9; --border:#d0d4da;
  --text:#1a1a2e; --text-dim:#6b7280; --bg:#f7f8fa;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}

/* === Reset & Base === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden}
a{color:var(--accent-cyan);text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:.9rem;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand-red)}

/* === Loading Screen === */
#loading-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,visibility .4s}
#loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
#loading-screen .logo-text{font-size:2rem;font-weight:900;letter-spacing:4px;color:var(--brand-red);margin-bottom:12px}
#loading-screen .loading-bar{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
#loading-screen .loading-bar-fill{height:100%;width:0;background:var(--brand-red);animation:loadBar 1.2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes loadBar{0%{width:0}50%{width:70%}100%{width:100%}}

/* === Nav === */
#top-nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:var(--nav-height);gap:0;backdrop-filter:blur(12px)}
#top-nav .logo{font-weight:900;font-size:1.15rem;color:var(--brand-red);letter-spacing:2px;margin-right:auto;white-space:nowrap}
#top-nav .nav-tabs{display:flex;gap:0;height:100%;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
#top-nav .nav-tabs::-webkit-scrollbar{display:none}
#top-nav .nav-tab{position:relative;padding:0 14px;height:100%;display:flex;align-items:center;font-size:.82rem;font-weight:600;color:var(--text-dim);background:none;transition:color .2s;white-space:nowrap;letter-spacing:.5px}
#top-nav .nav-tab:hover{color:var(--text)}
#top-nav .nav-tab.active{color:var(--brand-red)}
#top-nav .nav-tab.active::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2px;background:var(--brand-red)}
#top-nav .nav-actions{display:flex;align-items:center;gap:8px;margin-left:12px}
#top-nav .btn-icon{width:36px;height:36px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:background .15s;border:1px solid var(--border)}
#top-nav .btn-icon:hover{background:var(--surface-hover)}
#top-nav .btn-auth{padding:6px 16px;border-radius:var(--radius);font-size:.8rem;font-weight:600;background:var(--brand-red);color:#fff;transition:opacity .15s}
#top-nav .btn-auth:hover{opacity:.85}

/* === Content Area === */
#content{max-width:1200px;margin:0 auto;padding:20px 16px 80px}
.tab-content{display:none}
.tab-content.active{display:block;animation:fadeSlideIn .35s ease-out}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* === Section Header === */
.section-header{margin-bottom:24px}
.section-header h2{font-size:1.6rem;font-weight:800;letter-spacing:1px}
.section-header p{color:var(--text-dim);font-size:.88rem;margin-top:4px}

/* === Daily Quote === */
.daily-quote{background:var(--surface);border-left:3px solid var(--brand-red);padding:16px 20px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:28px;font-style:italic;font-size:.92rem;color:var(--text-dim)}
.daily-quote .author{display:block;margin-top:6px;font-size:.78rem;color:var(--brand-red);font-style:normal;font-weight:600}

/* === Sins Grid + Check === */
.sin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s;position:relative;display:flex;gap:12px;align-items:flex-start}
.sin-card:hover{border-color:var(--brand-red);transform:translateY(-1px);box-shadow:var(--shadow)}
.sin-card input[type="checkbox"]{appearance:none;-webkit-appearance:none;width:22px;height:22px;min-width:22px;border:2px solid var(--border);border-radius:var(--radius-sm);background:transparent;cursor:pointer;transition:all .15s;margin-top:2px;position:relative}
.sin-card input[type="checkbox"]:checked{background:var(--brand-red);border-color:var(--brand-red)}
.sin-card input[type="checkbox"]:checked::after{content:'';position:absolute;left:6px;top:2px;width:4px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.sin-info{flex:1}.sin-num{font-family:var(--font-mono);font-size:.72rem;color:var(--text-dim);margin-bottom:2px}
.sin-name{font-weight:700;color:var(--brand-red);margin-bottom:4px}
.sin-desc{font-size:.85rem;color:var(--text-dim);line-height:1.5;margin-bottom:6px}
.sin-fix{font-size:.78rem;color:var(--accent-cyan);padding:5px 8px;background:rgba(0,229,255,.04);border-radius:var(--radius-sm);border-left:2px solid var(--accent-cyan)}

/* === Sin Stats === */
.sin-stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:20px;padding:16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border)}
.sin-stats .stat{text-align:center;flex:1;min-width:80px}
.sin-stats .stat .val{font-size:1.8rem;font-weight:900;color:var(--brand-red);font-family:var(--font-mono)}
.sin-stats .stat .lbl{font-size:.75rem;color:var(--text-dim)}
.sin-stats .stat.worst .val{color:#ffaa00}

/* === Squad === */
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.squad-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s}
.squad-card:hover{border-color:var(--brand-red);box-shadow:var(--shadow)}
.squad-card .sq-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.squad-card .sq-desc{font-size:.82rem;color:var(--text-dim);margin-bottom:12px}
.squad-card .sq-meta{display:flex;gap:16px;font-size:.78rem;color:var(--text-dim);margin-bottom:12px}
.squad-card .sq-members{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.squad-card .member-tag{font-size:.72rem;padding:3px 8px;border-radius:12px;background:var(--surface-hover);border:1px solid var(--border);white-space:nowrap}
.squad-card .btn-join{width:100%;padding:8px;border-radius:var(--radius-sm);font-weight:600;font-size:.85rem;background:var(--brand-red);color:#fff;transition:opacity .15s}
.squad-card .btn-join:hover{opacity:.85}
.squad-card .btn-join.joined{background:var(--surface-hover);color:var(--text);border:1px solid var(--border)}
.squad-card .role-badge{padding:2px 6px;border-radius:var(--radius-sm);font-size:.7rem;font-weight:600;background:var(--brand-red);color:#fff;margin-left:6px}

/* === Match Records === */
.match-list{display:flex;flex-direction:column;gap:8px}
.match-row{display:grid;grid-template-columns:60px 80px 1fr 40px 40px 40px 40px;gap:12px;align-items:center;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;transition:all .15s}
.match-row:hover{border-color:var(--brand-red)}
.match-row.win{border-left:3px solid #00e5a0}
.match-row.lose{border-left:3px solid var(--brand-red)}
.match-row .result-tag{padding:2px 10px;border-radius:12px;font-size:.72rem;font-weight:600;text-align:center}
.match-row.win .result-tag{background:rgba(0,229,160,.15);color:#00e5a0}
.match-row.lose .result-tag{background:rgba(255,70,85,.15);color:var(--brand-red)}
.match-row .kda{font-family:var(--font-mono);font-size:.82rem}
.btn-action{padding:8px 20px;border-radius:var(--radius-sm);font-weight:600;font-size:.82rem;background:var(--surface);color:var(--text);border:1px solid var(--border);transition:all .15s}
.btn-action:hover{background:var(--surface-hover);border-color:var(--brand-red)}
.btn-action.primary{background:var(--brand-red);color:#fff;border-color:var(--brand-red)}
.btn-action.primary:hover{opacity:.85}

/* === Guide Section === */
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:28px}
.guide-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.guide-card:hover{border-color:var(--brand-red);transform:translateY(-2px);box-shadow:var(--shadow)}
.guide-card .agent-icon{font-size:2.5rem;margin-bottom:6px;display:block}
.guide-card .agent-name{font-weight:700;font-size:.82rem}
.guide-card .agent-role{font-size:.7rem;color:var(--text-dim)}
.guide-modal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.guide-modal.open{display:flex;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.guide-modal .modal-content{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:640px;width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.guide-modal .modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:1.5rem;cursor:pointer;line-height:1}
.guide-modal .modal-close:hover{color:var(--brand-red)}
.guide-modal h3{color:var(--brand-red);font-size:1.3rem;margin-bottom:8px}
.guide-modal .skill-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.guide-modal .skill-item{background:var(--surface);padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.guide-modal .skill-item .sk-name{font-weight:700;font-size:.8rem;color:var(--accent-cyan)}
.guide-modal .skill-item .sk-desc{font-size:.78rem;color:var(--text-dim);margin-top:2px}
.guide-modal .guide-sub{margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.guide-modal .guide-sub h4{font-size:.85rem;font-weight:700;margin-bottom:6px}
.guide-modal .guide-sub .sub-tag{display:inline-block;background:var(--surface);padding:4px 10px;border-radius:12px;font-size:.75rem;margin:3px;border:1px solid var(--border)}

/* === Sub Guide Tabs === */
.sub-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:8px 18px;font-size:.82rem;font-weight:600;color:var(--text-dim);background:none;border:none;cursor:pointer;white-space:nowrap;transition:color .15s;position:relative}
.sub-tab:hover{color:var(--text)}
.sub-tab.active{color:var(--brand-red)}
.sub-tab.active::after{content:'';position:absolute;bottom:-1px;left:18px;right:18px;height:2px;background:var(--brand-red)}

/* === Leaderboard === */
.lb-table{width:100%;border-collapse:collapse;font-size:.85rem}
.lb-table th{text-align:left;padding:12px 16px;color:var(--text-dim);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.lb-table td{padding:12px 16px;border-bottom:1px solid var(--border)}
.lb-table tr:hover td{background:var(--surface-hover)}
.lb-table .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-weight:800;font-size:.8rem;font-family:var(--font-mono)}
.lb-table .rank-badge.gold{background:#ffaa00;color:#0f1923}
.lb-table .rank-badge.silver{background:#a0b0c0;color:#0f1923}
.lb-table .rank-badge.bronze{background:#cd7f32;color:#fff}

/* === Profile === */
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:500px}
.profile-card .avatar{width:72px;height:72px;border-radius:50%;background:var(--surface-hover);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:16px}
.profile-field{margin-bottom:16px}
.profile-field label{display:block;font-size:.78rem;font-weight:600;color:var(--text-dim);margin-bottom:4px}
.profile-field input{width:100%}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row .lbl{font-weight:500;font-size:.9rem}
.setting-row .hint{font-size:.75rem;color:var(--text-dim)}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--brand-red)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px)}

/* === Auth Modal === */
.auth-overlay{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.auth-overlay.open{display:flex}
.auth-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:90vw;max-width:380px;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.auth-box h3{font-size:1.2rem;margin-bottom:20px;text-align:center}
.auth-box .form-group{margin-bottom:14px}
.auth-box .form-group input{width:100%}
.auth-box .btn-full{width:100%;padding:10px;border-radius:var(--radius-sm);font-weight:600;font-size:.9rem;margin-top:6px}
.auth-box .auth-switch{text-align:center;margin-top:16px;font-size:.82rem;color:var(--text-dim)}
.auth-box .auth-switch button{background:none;color:var(--accent-cyan);font-weight:600;cursor:pointer;font-size:.82rem}

/* === Toast === */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:500;padding:10px 24px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:.82rem;box-shadow:var(--shadow);opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.error{border-color:var(--brand-red);color:var(--brand-red)}
#toast.success{border-color:#00e5a0;color:#00e5a0}

/* === Search === */
.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-bar input{flex:1;padding:10px 16px;border-radius:20px;font-size:.85rem}

/* === Footer === */
.footer{text-align:center;margin-top:40px;padding:20px;border-top:1px solid var(--border);color:var(--text-dim);font-size:.78rem}

/* === Responsive === */
@media(max-width:768px){
  #top-nav .nav-tab{padding:0 8px;font-size:.72rem}
  #top-nav .logo{font-size:.9rem;letter-spacing:1px}
  .match-row{grid-template-columns:50px 70px 1fr 35px 35px 35px;gap:6px;font-size:.78rem;padding:10px}
  .squad-grid{grid-template-columns:1fr}
  .guide-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo-text">VCT HUB</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<nav id="top-nav">
  <div class="logo">VCT HUB</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="sins">十宗罪</button>
    <button class="nav-tab" data-tab="squad">车队大厅</button>
    <button class="nav-tab" data-tab="matches">对局记录</button>
    <button class="nav-tab" data-tab="guide">进阶指南</button>
    <button class="nav-tab" data-tab="leaderboard">排行榜</button>
    <button class="nav-tab" data-tab="profile">我的</button>
  </div>
  <div class="nav-actions">
    <button class="btn-icon" id="btn-search" title="搜索">🔍</button>
    <button class="btn-icon" id="btn-theme" title="切换主题">🌓</button>
    <button class="btn-icon" id="btn-share" title="分享">🔗</button>
    <button class="btn-auth" id="btn-auth">登录</button>
  </div>
</nav>

<div id="content">

<!-- Tab: 十宗罪 -->
<div class="tab-content active" id="tab-sins">
  <div class="section-header"><h2>无畏契约十宗罪</h2><p>识别并克服破坏团队协作的致命习惯</p></div>
  <div class="daily-quote" id="daily-quote"><span class="quote-text">加载中...</span><span class="author"></span></div>
  <div class="search-bar"><input type="text" id="sin-search" placeholder="搜索罪状..."></div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px" id="sins-grid"></div>
  <div class="sin-stats" id="sin-stats" style="display:none">
    <div class="stat"><div class="val" id="stat-checked">0</div><div class="lbl">今日忏悔</div></div>
    <div class="stat worst"><div class="val" id="stat-worst">—</div><div class="lbl">最严重</div></div>
  </div>
</div>

<!-- Tab: 车队大厅 -->
<div class="tab-content" id="tab-squad">
  <div class="section-header"><h2>车队大厅</h2><p>找到志同道合的战友，共同上分</p></div>
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    <button class="btn-action primary" id="btn-create-squad">创建车队</button>
    <input type="text" id="squad-search" placeholder="搜索车队..." style="flex:1;min-width:200px">
  </div>
  <div class="squad-grid" id="squad-grid"><p style="color:var(--text-dim);grid-column:1/-1;text-align:center;padding:40px">登录后即可浏览和加入车队</p></div>
</div>

<!-- Tab: 对局记录 -->
<div class="tab-content" id="tab-matches">
  <div class="section-header"><h2>对局记录</h2><p>关联你的 Riot ID，一键拉取对局数据</p></div>
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
    <input type="text" id="riot-name" placeholder="Riot ID (例如: 玩家名#TAG)" style="flex:1;min-width:200px">
    <button class="btn-action primary" id="btn-fetch-matches">一键拉取</button>
    <button class="btn-action" id="btn-add-match">手动录入</button>
  </div>
  <div class="match-list" id="match-list"><p style="color:var(--text-dim);text-align:center;padding:40px">登录并关联 Riot ID 后即可查看对局</p></div>
</div>

<!-- Tab: 进阶指南 -->
<div class="tab-content" id="tab-guide">
  <div class="section-header"><h2>进阶指南</h2><p>25 名特工 · 10 张地图 · 武器道具 · 决策流程</p></div>
  <div class="sub-tabs" id="guide-subtabs">
    <button class="sub-tab active" data-sub="agents">特工</button>
    <button class="sub-tab" data-sub="mira">迷核专题</button>
    <button class="sub-tab" data-sub="maps">地图</button>
    <button class="sub-tab" data-sub="weapons">武器</button>
    <button class="sub-tab" data-sub="items">道具</button>
    <button class="sub-tab" data-sub="progress">进化路线</button>
    <button class="sub-tab" data-sub="decisions">决策流程</button>
  </div>
  <div id="guide-content"></div>
</div>

<!-- Tab: 排行榜 -->
<div class="tab-content" id="tab-leaderboard">
  <div class="section-header"><h2>排行榜</h2><p>车队胜率 + 个人 MVP</p></div>
  <div class="sub-tabs" id="lb-subtabs">
    <button class="sub-tab active" data-lb="squads">车队胜率榜</button>
    <button class="sub-tab" data-lb="players">个人 MVP 榜</button>
  </div>
  <div id="lb-content"><p style="color:var(--text-dim);text-align:center;padding:40px">加载中...</p></div>
</div>

// === Audio ===
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type='square') {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sfxClick() { playSound(800, 0.08, 'square') }
function sfxSuccess() { playSound(1200, 0.12, 'sine'); setTimeout(()=>playSound(1600, 0.12, 'sine'), 80) }
function sfxError() { playSound(200, 0.2, 'sawtooth') }

// === Toast ===
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

const authBox = document.getElementById('auth-box');
const authBtn = document.getElementById('btn-auth');
let authMode = 'login';

function renderAuth() {
  authBox.innerHTML = `
    <h3>${authMode === 'login' ? '登录 VCT Hub' : '注册 VCT Hub'}</h3>
    <div class="form-group"><input type="email" id="auth-email" placeholder="邮箱"></div>
    <div class="form-group"><input type="password" id="auth-password" placeholder="密码"></div>

    <button class="btn-full btn-action primary" id="auth-submit">${authMode === 'login' ? '登录' : '注册'}</button>
    <div class="auth-switch">
      ${authMode === 'login' ? '没有账号？<button id="auth-switch">去注册</button>' : '已有账号？<button id="auth-switch">去登录</button>'}
    </div>
    <button style="background:none;color:var(--text-dim);width:100%;margin-top:8px;font-size:.8rem" id="auth-close">关闭</button>
  `;
  document.getElementById('auth-submit').addEventListener('click', handleAuth);
  document.getElementById('auth-switch').addEventListener('click', () => { authMode = authMode === 'login' ? 'register' : 'login'; renderAuth(); });
  document.getElementById('auth-close').addEventListener('click', () => authOverlay.classList.remove('open'));
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) { toast('请填写邮箱和密码', 'error'); sfxError(); return; }

  if (authMode === 'register') {
    const username = document.getElementById('auth-username')?.value.trim();
    if (!username) { toast('请填写游戏昵称', 'error'); return; }
    const { data, error } = await supa.auth.signUp({ email, password, options: { data: { username } } });
    if (error) { toast(error.message, 'error'); sfxError(); return; }
    toast('注册成功！请查看邮箱确认', 'success'); sfxSuccess();
    authOverlay.classList.remove('open');
  } else {
    const { data, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) { toast(error.message, 'error'); sfxError(); return; }
    toast('登录成功', 'success'); sfxSuccess();
    authOverlay.classList.remove('open');
    await initUser();
  }
}

authBtn.addEventListener('click', () => {
  if (currentUser) { supa.auth.signOut(); currentUser = null; currentProfile = null; updateAuthUI(); toast('已退出'); return; }
  authMode = 'login'; renderAuth(); authOverlay.classList.add('open');
});

});

function renderSins(filter='') {
  const grid = document.getElementById('sins-grid');
  const f = filter.toLowerCase();
  const filtered = sinsData.filter(s => !f || s.name.includes(f) || s.desc.includes(f) || s.fix.includes(f));
  grid.innerHTML = filtered.map(s => `
    <div class="sin-card" style="animation:fadeSlideIn ${0.1 + s.id * 0.05}s ease-out both">
      <input type="checkbox" data-sin="${s.id}" ${checkedSins[s.id] ? 'checked' : ''}>
      <div class="sin-info">
        <div class="sin-num">#${String(s.id).padStart(2,'0')}</div>
        <div class="sin-name">${s.emoji} ${s.name}</div>
        <div class="sin-desc">${s.desc}</div>
        <div class="sin-fix">✅ ${s.fix}</div>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('#sins-grid input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      checkedSins[cb.dataset.sin] = cb.checked;
      localStorage.setItem('vct_checked_sins', JSON.stringify(checkedSins));
      updateSinStats();
      cb.checked ? sfxClick() : playSound(400, 0.06);
    });
  });
  updateSinStats();

function updateSinStats() {
  const checked = Object.values(checkedSins).filter(Boolean).length;
  document.getElementById('sin-stats').style.display = checked > 0 ? 'flex' : 'none';
  document.getElementById('stat-checked').textContent = checked;
  const worstId = Object.entries(checkedSins).filter(([_,v]) => v).map(([k]) => parseInt(k))[0];
  document.getElementById('stat-worst').textContent = worstId ? sinsData.find(s => s.id === worstId)?.name || '—' : '—';
}

  allSquads = data || [];
  renderSquads();
}

function renderSquads(filter='') {
  const grid = document.getElementById('squad-grid');
  const f = filter.toLowerCase();
  const filtered = allSquads.filter(s => !f || s.name.toLowerCase().includes(f) || s.description.toLowerCase().includes(f));
  if (!filtered.length) { grid.innerHTML = '<p style="color:var(--text-dim);grid-column:1/-1;text-align:center;padding:40px">没有找到车队，创建一个吧</p>'; return; }
  grid.innerHTML = filtered.map(s => {
    const members = s.squad_members || [];
    const isMember = members.some(m => m.user_id === currentUser?.id);
    return `
    <div class="squad-card">
      <div class="sq-name">${s.name}</div>
      <div class="sq-desc">${s.description || '队长很懒，什么都没写'}</div>
      <div class="sq-meta"><span>👥 ${s.member_count || members.length} 人</span><span>📊 胜率 ${(s.win_rate || 0).toFixed(1)}%</span></div>
      <div class="sq-members">${members.slice(0, 6).map(m => {
        const agents = Array.isArray(m.preferred_agents) ? m.preferred_agents : [];
        const maps = Array.isArray(m.preferred_maps) ? m.preferred_maps : [];
        return `<span class="member-tag">${m.profiles?.username || '匿名'}${m.role ? `<span class="role-badge">${m.role}</span>` : ''}${agents.length ? ' 🎯'+agents.slice(0,2).join('/') : ''}${maps.length ? ' 🗺️'+maps.slice(0,1) : ''}</span>`;
      }).join('')}</div>
      <button class="btn-join ${isMember ? 'joined' : ''}" data-sid="${s.id}">${isMember ? '已加入' : '加入车队'}</button>
    </div>`;
  });
  document.querySelectorAll('.btn-join').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!currentUser) { toast('请先登录', 'error'); return; }
      const sid = btn.dataset.sid;
      if (btn.classList.contains('joined')) {
        await supa.from('squad_members').delete().eq('squad_id', sid).eq('user_id', currentUser.id);
        toast('已退出车队', 'success'); sfxSuccess(); loadSquads();
      } else {
        openSquadJoin(sid);
      }
    });
  });
}

async function loadMatches() {

}

function renderMatches() {
  const list = document.getElementById('match-list');
  if (!allMatches.length) { list.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px">暂无对局记录，点击"一键拉取"或"手动录入"</p>'; return; }
  list.innerHTML = allMatches.map(m => `
    <div class="match-row ${m.result}">
      <div><span class="result-tag">${m.result === 'win' ? '胜利' : m.result === 'lose' ? '失败' : '平局'}</span></div>
      <div>${getMapName(m.map_name)}</div>
      <div>${getAgentName(m.agent)}</div>
      <div class="kda">${m.kills}/${m.deaths}/${m.assists}</div>
      <div>${m.score}</div>
      <div>${m.econ_rating}</div>
      <div style="font-size:.72rem;color:var(--text-dim)">${new Date(m.match_date).toLocaleDateString('zh-CN')}</div>
    </div>
  `).join('');

document.getElementById('btn-fetch-matches').addEventListener('click', async () => {
  if (!currentUser) { toast('请先登录', 'error'); return; }
  const riotId = document.getElementById('riot-name').value.trim();
  if (!riotId || !riotId.includes('#')) { toast('请输入完整的 Riot ID（格式: 玩家名#TAG）', 'error'); return; }
  const [name, tag] = riotId.split('#');
  toast('正在从 Riot 拉取对局...', '');
  try {
    const resp = await fetch(`${EDGE_URL}?name=${encodeURIComponent(name)}&tag=${encodeURIComponent(tag)}&region=ap`);
    const json = await resp.json();
    if (json.error) { toast(json.error, 'error'); sfxError(); return; }
    if (!json.matches || !json.matches.length) { toast('未找到对局记录', 'error'); return; }
    // Save PUUID to profile
    if (json.puuid) { await supa.from('profiles').update({ riot_id: riotId, riot_puuid: json.puuid }).eq('id', currentUser.id); }
    // Insert matches
    let inserted = 0;
    for (const m of json.matches) {
      const { error } = await supa.from('match_records').upsert({
        user_id: currentUser.id,
        map_name: m.mapId, agent: m.agentId, result: m.result,
        kills: m.kills, deaths: m.deaths, assists: m.assists,
        score: m.score, econ_rating: m.econRating, match_date: m.matchDate,
      }, { onConflict: 'id' });
      if (!error) inserted++;
    }
    toast(`成功拉取 ${inserted} 场对局`, 'success'); sfxSuccess(); loadMatches();
  } catch(e) { toast('连接失败: ' + e.message, 'error'); sfxError(); }
});

// === Leaderboard ===
async function loadLeaderboard(lbType = 'squads') {
  const content = document.getElementById('lb-content');
  if (lbType === 'squads') {
    const { data } = await supa.from('squads').select('*').order('win_rate', { ascending: false }).limit(20);
    if (!data || !data.length) { content.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px">暂无车队数据</p>'; return; }
    content.innerHTML = `<table class="lb-table"><thead><tr><th>#</th><th>车队</th><th>人数</th><th>胜率</th></tr></thead><tbody>${data.map((s,i) => `
      <tr><td><span class="rank-badge ${i<3 ? 'gold' : i<10 ? 'silver' : 'bronze'}">${i+1}</span></td><td>${s.name}</td><td>${s.member_count}</td><td>${(s.win_rate||0).toFixed(1)}%</td></tr>
    `).join('')}</tbody></table>`;
  } else {
    const { data } = await supa.from('profiles').select('*').order('kills', { ascending: false }).limit(20);
    if (!data || !data.length) { content.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px">暂无玩家数据</p>'; return; }
    content.innerHTML = `<table class="lb-table"><thead><tr><th>#</th><th>玩家</th><th>K/D/A</th><th>对局</th><th>胜率</th></tr></thead><tbody>${data.map((p,i) => {
      const wr = p.total_matches > 0 ? (p.wins / p.total_matches * 100).toFixed(1) : '0.0';
      return `<tr><td><span class="rank-badge ${i<3 ? 'gold' : i<10 ? 'silver' : 'bronze'}">${i+1}</span></td><td>${p.username || p.riot_id || '匿名'}</td><td>${p.kills}/${p.deaths}/${p.assists}</td><td>${p.total_matches}</td><td>${wr}%</td></tr>`;
    }).join('')}</tbody></table>`;
  }
}

document.querySelectorAll('#lb-subtabs .sub-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#lb-subtabs .sub-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadLeaderboard(btn.dataset.lb);

});

// === Profile ===
function renderProfile() {
  const content = document.getElementById('profile-content');
  if (!currentUser) { content.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px">请先登录</p>'; return; }
  content.innerHTML = `
    <div class="profile-card">
      <div class="avatar">${currentProfile?.username?.[0]?.toUpperCase() || '?'}</div>
      <div class="profile-field"><label>游戏昵称</label><input type="text" id="pf-username" value="${currentProfile?.username || ''}"></div>
      <div class="profile-field"><label>Riot ID</label><input type="text" id="pf-riot" value="${currentProfile?.riot_id || ''}" placeholder="玩家名#TAG"></div>
      <button class="btn-action primary" id="btn-save-profile" style="width:100%">保存</button>
      <div style="margin-top:20px">
        <div class="setting-row"><span class="lbl">暗黑模式</span><label class="toggle-switch"><input type="checkbox" id="toggle-theme" ${document.documentElement.getAttribute('data-theme')==='dark'?'checked':''}><span class="toggle-slider"></span></label></div>
        <div class="setting-row"><span class="lbl">音效</span><label class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></label></div>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:8px;flex-wrap:wrap">${sinsData.map(s => `
      <span style="padding:4px 10px;border-radius:12px;font-size:.78rem;background:var(--surface);border:1px solid var(--border)">${s.emoji} ${s.name}</span>
    `).join('')}</div>
  `;
  document.getElementById('btn-save-profile').addEventListener('click', async () => {
    const username = document.getElementById('pf-username').value.trim();
    const riotId = document.getElementById('pf-riot').value.trim();
    const { error } = await supa.from('profiles').upsert({ id: currentUser.id, username, riot_id: riotId });
    if (error) { toast(error.message, 'error'); sfxError(); return; }
    currentProfile = { ...currentProfile, username, riot_id: riotId };
    updateAuthUI();
    toast('保存成功', 'success'); sfxSuccess();
  });
  document.getElementById('toggle-theme').addEventListener('change', e => {
    document.documentElement.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
    localStorage.setItem('vct_theme', e.target.checked ? 'dark' : 'light');
  });
}

// === Share ===
document.getElementById('btn-share').addEventListener('click', () => {
  const url = 'https://chenyizhou188.github.io/valorant-sins/';

initUser();

function openAgent(id) {
  const a = AGENT_DATA[id];
  if (!a) return;
  document.getElementById('agent-modal').classList.add('open');
  document.getElementById('agent-modal-content').innerHTML = `
    <button class="modal-close" onclick="document.getElementById('agent-modal').classList.remove('open')">&times;</button>
    <h3>${a.icon} ${a.name}</h3>
    <div style="display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;background:var(--surface);border:1px solid var(--border);margin-bottom:12px">${a.role}</div>
    <div class="skill-list">${a.skills.map(s => `
      <div class="skill-item"><div class="sk-name">${s[0]}</div><div class="sk-desc">${s[1]}</div></div>
    `).join('')}</div>
    <div class="guide-sub"><h4>🤝 最佳配合</h4>${a.synergy.map(s => `<span class="sub-tag">${s}</span>`).join('')}</div>
    <div class="guide-sub"><h4>🗺️ 推荐地图</h4>${a.maps.map(m => `<span class="sub-tag">${m}</span>`).join('')}</div>
  `;
  sfxClick();
}
